name: Deploy to Production — Z-Books

on:
  push:
    branches: [main]

# Only run one production deploy at a time
concurrency:
  group: production
  cancel-in-progress: false

jobs:
  # Quality gate runs first — reuses the ci.yml checks
  quality-gate:
    name: Final Quality Check Before Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

      - name: Run tests
        run: npm test -- --run
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
          NEXT_PUBLIC_APP_URL: http://localhost:3000

      - name: Production build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

      - name: Secret scan
        run: |
          if grep -rn "ANTHROPIC_API_KEY" --include="*.tsx" . | grep -v "node_modules" | grep -v "route.ts"; then
            echo "❌ BLOCKED: ANTHROPIC_API_KEY exposed in client file"
            exit 1
          fi
          echo "✅ Secret scan passed"

  # Vercel handles the actual deployment via GitHub integration
  # This job triggers the Vercel deploy and verifies it succeeded
  deploy-production:
    name: Trigger Vercel Production Deploy
    runs-on: ubuntu-latest
    needs: quality-gate
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel Production
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

      - name: Health check — wait for deploy
        run: |
          echo "Waiting 45 seconds for deployment to complete..."
          sleep 45
          echo "Running health check..."
          curl -f ${{ secrets.NEXT_PUBLIC_APP_URL }}/api/health || exit 1
          echo "✅ Production health check passed"

      - name: Notify success
        if: success()
        run: |
          echo "✅ Z-Books deployed to production"
          echo "URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}"
          echo "Commit: ${{ github.sha }}"
          echo "By: ${{ github.actor }}"

      - name: Notify failure
        if: failure()
        run: |
          echo "❌ PRODUCTION DEPLOY FAILED"
          echo "Commit: ${{ github.sha }}"
          echo "Check: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "Previous deploy is still live — no rollback needed (Vercel atomic deploys)"

  # Run database migrations after successful deploy
  run-migrations:
    name: Apply Pending DB Migrations
    runs-on: ubuntu-latest
    needs: deploy-production
    if: success()

    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply pending migrations
        run: |
          supabase db push --db-url "${{ secrets.SUPABASE_DB_URL }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
